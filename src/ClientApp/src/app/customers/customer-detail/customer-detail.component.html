<p>{{ customer.lastName }}, {{ customer.firstName }}</p>
<button pButton 
    type="button" 
    (click)="edit()" 
    class="pi pi-user-edit" 
    label="Edit" 
    iconPos="left"></button>
    
<div *ngIf="!editMode && customer">
    <span>{{ customer.firstName }}</span>
    <span>{{ customer.middleName }}</span>
    <span>{{ customer.lastName }}</span>
    <span>{{ customer.dateOfBirth }}</span>
</div>
